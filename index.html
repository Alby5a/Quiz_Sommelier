<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Sommelier AIS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --wine: #722F37;
    --wine-dark: #4A1C23;
    --wine-light: #8B3A42;
    --gold: #C9A84C;
    --gold-light: #E8D48B;
    --cream: #FFF8F0;
    --bg: #1A1A2E;
    --card: #16213E;
    --card-hover: #1A2744;
    --text: #E8E8E8;
    --text-muted: #A0A0B0;
    --correct: #2D6A4F;
    --correct-bg: #1B4332;
    --wrong: #9B2226;
    --wrong-bg: #641220;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .bg-pattern {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(114,47,55,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 100%, rgba(114,47,55,0.1) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 20px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header .icon {
    font-size: 48px;
    margin-bottom: 8px;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.5px;
  }
  .header p {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-top: 4px;
  }

  /* SCREENS */
  .screen { display: none; }
  .screen.active { display: block; }

  /* START SCREEN */
  .start-card {
    background: var(--card);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: var(--radius);
    padding: 40px 32px;
    text-align: center;
  }
  .start-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: var(--gold);
    margin-bottom: 16px;
  }
  .start-card p {
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 8px;
    font-size: 0.95rem;
  }
  .stats-row {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin: 24px 0;
  }
  .stat-item {
    text-align: center;
  }
  .stat-number {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--gold);
  }
  .stat-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .num-selector {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 24px 0 28px;
    flex-wrap: wrap;
  }
  .num-btn {
    background: transparent;
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    padding: 8px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }
  .num-btn:hover { background: rgba(201,168,76,0.1); }
  .num-btn.selected {
    background: var(--gold);
    color: var(--bg);
    font-weight: 600;
    border-color: var(--gold);
  }

  /* BUTTONS */
  .btn-primary {
    background: linear-gradient(135deg, var(--wine), var(--wine-dark));
    color: #fff;
    border: 1px solid var(--wine-light);
    padding: 14px 48px;
    border-radius: var(--radius);
    font-size: 1.05rem;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 0.3px;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(114,47,55,0.4);
  }

  .btn-secondary {
    background: transparent;
    color: var(--gold);
    border: 1px solid rgba(201,168,76,0.3);
    padding: 12px 36px;
    border-radius: var(--radius);
    font-size: 0.95rem;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover {
    background: rgba(201,168,76,0.1);
  }

  /* PROGRESS BAR */
  .progress-section {
    margin-bottom: 24px;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .progress-text {
    font-size: 0.85rem;
    color: var(--text-muted);
  }
  .progress-text span { color: var(--gold); font-weight: 600; }
  .progress-bar {
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--wine), var(--gold));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* CATEGORY BADGE */
  .category-badge {
    display: inline-block;
    background: rgba(201,168,76,0.12);
    color: var(--gold);
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 16px;
  }

  /* QUESTION CARD */
  .question-card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: var(--radius);
    padding: 32px 28px;
    margin-bottom: 20px;
  }
  .question-text {
    font-size: 1.1rem;
    line-height: 1.7;
    font-weight: 400;
    color: #f0f0f0;
  }

  /* OPTIONS */
  .options-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }
  .option-btn {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--radius);
    padding: 16px 20px;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .option-btn:hover:not(.disabled) {
    background: var(--card-hover);
    border-color: rgba(201,168,76,0.3);
  }
  .option-btn.selected {
    border-color: var(--gold);
    background: rgba(201,168,76,0.08);
  }
  .option-btn.disabled { cursor: default; }
  .option-letter {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--text-muted);
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .option-btn.selected .option-letter {
    background: var(--gold);
    color: var(--bg);
  }

  /* CONFIRM / NEXT */
  .action-bar {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
  }

  /* RESULTS SCREEN */
  .results-card {
    background: var(--card);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: var(--radius);
    padding: 40px 32px;
    text-align: center;
    margin-bottom: 24px;
  }
  .score-circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 4px solid var(--gold);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    position: relative;
  }
  .score-circle .score-val {
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
  }
  .score-circle .score-pct {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .score-message {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .score-detail {
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  /* REVIEW */
  .review-section { margin-top: 24px; }
  .review-section h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: var(--gold);
    margin-bottom: 16px;
    text-align: left;
  }
  .review-item {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 12px;
    border-left: 4px solid var(--wrong);
    text-align: left;
  }
  .review-question {
    font-size: 0.95rem;
    color: #f0f0f0;
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .review-answers {
    font-size: 0.85rem;
    line-height: 1.8;
  }
  .review-wrong {
    color: #E57373;
  }
  .review-correct {
    color: #81C784;
  }

  .results-actions {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 32px;
    flex-wrap: wrap;
  }

  /* TIMER */
  .timer {
    font-size: 0.85rem;
    color: var(--text-muted);
  }
  .timer span { color: var(--gold); }

  /* ANIMATIONS */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeIn 0.35s ease; }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .container { padding: 16px 14px; }
    .question-card { padding: 24px 18px; }
    .question-text { font-size: 1rem; }
    .start-card { padding: 28px 20px; }
    .header h1 { font-size: 1.6rem; }
    .stats-row { gap: 20px; }
    .stat-number { font-size: 1.5rem; }
  }
</style>
</head>
<body>
<div class="bg-pattern"></div>

<div class="container">
  <div class="header">
    <div class="icon">🍷</div>
    <h1>Quiz Sommelier AIS</h1>
    <p>Allenamento per l'esame di terzo livello</p>
  </div>

  <!-- START SCREEN -->
  <div id="screen-start" class="screen active">
    <div class="start-card fade-in">
      <h2>Pronto per allenarti?</h2>
      <p>Domande estratte casualmente dal database.<br>Rispondi e scopri il tuo punteggio alla fine.</p>

      <div class="stats-row">
        <div class="stat-item">
          <div class="stat-number" id="total-q">197</div>
          <div class="stat-label">Domande totali</div>
        </div>
        <div class="stat-item">
          <div class="stat-number" id="total-cat">22</div>
          <div class="stat-label">Categorie</div>
        </div>
      </div>

      <p style="font-size:0.85rem; color: var(--text-muted); margin-bottom: 4px;">Numero di domande:</p>
      <div class="num-selector">
        <button class="num-btn" data-n="10">10</button>
        <button class="num-btn selected" data-n="20">20</button>
        <button class="num-btn" data-n="30">30</button>
        <button class="num-btn" data-n="0">Tutte</button>
      </div>

      <button class="btn-primary" id="btn-start">Inizia il quiz</button>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="screen-quiz" class="screen">
    <div class="progress-section">
      <div class="progress-info">
        <div class="progress-text">Domanda <span id="q-current">1</span> di <span id="q-total">20</span></div>
        <div class="timer" id="timer">⏱ <span>0:00</span></div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div id="quiz-body" class="fade-in">
      <span class="category-badge" id="q-category">Generale</span>
      <div class="question-card">
        <div class="question-text" id="q-text"></div>
      </div>
      <div class="options-list" id="q-options"></div>
      <div class="action-bar">
        <button class="btn-primary" id="btn-confirm" disabled>Conferma</button>
      </div>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="screen-results" class="screen">
    <div class="results-card fade-in">
      <div class="score-circle">
        <div class="score-val" id="res-score">0</div>
        <div class="score-pct" id="res-pct">0%</div>
      </div>
      <div class="score-message" id="res-message">Ottimo!</div>
      <div class="score-detail" id="res-detail"></div>
    </div>

    <div class="review-section" id="review-section">
      <h3>Risposte sbagliate</h3>
      <div id="review-list"></div>
    </div>

    <div class="results-actions">
      <button class="btn-primary" id="btn-retry">Nuovo quiz</button>
      <button class="btn-secondary" id="btn-retry-wrong">Ripeti solo le sbagliate</button>
    </div>
  </div>
</div>

// ========== STATE ==========
let quizQuestions = [];
let currentIndex = 0;
let selectedOption = null;
let answers = []; // { question, selected, correct, isCorrect }
let timerInterval = null;
let elapsedSeconds = 0;
let numQuestions = 20;

// ========== DOM ==========
const $ = id => document.getElementById(id);
const screens = {
  start: $('screen-start'),
  quiz: $('screen-quiz'),
  results: $('screen-results')
};

function showScreen(name) {
  Object.values(screens).forEach(s => s.classList.remove('active'));
  screens[name].classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ========== INIT ==========
function init() {
  const cats = new Set(DOMANDE.map(d => d.categoria));
  $('total-q').textContent = DOMANDE.length;
  $('total-cat').textContent = cats.size;

  // Num selector
  document.querySelectorAll('.num-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      numQuestions = parseInt(btn.dataset.n) || DOMANDE.length;
    });
  });

  $('btn-start').addEventListener('click', startQuiz);
  $('btn-confirm').addEventListener('click', confirmAnswer);
  $('btn-retry').addEventListener('click', () => { showScreen('start'); });
  $('btn-retry-wrong').addEventListener('click', retryWrong);
}

// ========== QUIZ LOGIC ==========
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz(customQuestions) {
  if (Array.isArray(customQuestions)) {
    quizQuestions = shuffle(customQuestions);
  } else {
    quizQuestions = shuffle(DOMANDE).slice(0, numQuestions);
  }
  currentIndex = 0;
  selectedOption = null;
  answers = [];
  elapsedSeconds = 0;

  $('q-total').textContent = quizQuestions.length;
  startTimer();
  showScreen('quiz');
  renderQuestion();
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    elapsedSeconds++;
    const m = Math.floor(elapsedSeconds / 60);
    const s = String(elapsedSeconds % 60).padStart(2, '0');
    $('timer').innerHTML = `⏱ <span>${m}:${s}</span>`;
  }, 1000);
}

function renderQuestion() {
  const q = quizQuestions[currentIndex];
  selectedOption = null;
  $('btn-confirm').disabled = true;
  $('btn-confirm').textContent = currentIndex === quizQuestions.length - 1 ? 'Termina' : 'Conferma';

  $('q-current').textContent = currentIndex + 1;
  const pct = ((currentIndex) / quizQuestions.length) * 100;
  $('progress-fill').style.width = pct + '%';

  $('q-category').textContent = q.categoria;
  $('q-text').textContent = q.question;

  const letters = 'ABCDEFGH';
  const optContainer = $('q-options');
  optContainer.innerHTML = '';

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.addEventListener('click', () => selectOption(i, btn));
    optContainer.appendChild(btn);
  });

  // Fade in
  const body = $('quiz-body');
  body.classList.remove('fade-in');
  void body.offsetWidth;
  body.classList.add('fade-in');
}

function selectOption(index, btn) {
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedOption = index;
  $('btn-confirm').disabled = false;
}

function confirmAnswer() {
  if (selectedOption === null) return;

  const q = quizQuestions[currentIndex];
  const selected = q.options[selectedOption];
  const isCorrect = selected === q.answer;

  answers.push({
    question: q.question,
    categoria: q.categoria,
    selected,
    correct: q.answer,
    isCorrect,
    options: q.options
  });

  currentIndex++;
  if (currentIndex < quizQuestions.length) {
    renderQuestion();
  } else {
    clearInterval(timerInterval);
    showResults();
  }
}

// ========== RESULTS ==========
function showResults() {
  const correct = answers.filter(a => a.isCorrect).length;
  const total = answers.length;
  const pct = Math.round((correct / total) * 100);

  $('res-score').textContent = `${correct}/${total}`;
  $('res-pct').textContent = `${pct}%`;

  const m = Math.floor(elapsedSeconds / 60);
  const s = String(elapsedSeconds % 60).padStart(2, '0');

  let msg = '';
  if (pct >= 90) msg = 'Eccellente! Sei pronto per l\'esame!';
  else if (pct >= 75) msg = 'Molto bene! Quasi pronto!';
  else if (pct >= 60) msg = 'Buono, ma ripassa qualche argomento.';
  else if (pct >= 40) msg = 'Devi ancora studiare un po\'...';
  else msg = 'Serve più studio. Non mollare!';

  $('res-message').textContent = msg;
  $('res-detail').textContent = `${correct} corrette, ${total - correct} sbagliate — Tempo: ${m}:${s}`;

  // Score circle color
  const circle = document.querySelector('.score-circle');
  if (pct >= 75) {
    circle.style.borderColor = '#81C784';
    $('res-score').style.color = '#81C784';
  } else if (pct >= 50) {
    circle.style.borderColor = '#C9A84C';
    $('res-score').style.color = 'var(--gold)';
  } else {
    circle.style.borderColor = '#E57373';
    $('res-score').style.color = '#E57373';
  }

  // Review wrong answers
  const wrong = answers.filter(a => !a.isCorrect);
  const reviewList = $('review-list');
  reviewList.innerHTML = '';

  if (wrong.length === 0) {
    $('review-section').style.display = 'none';
    $('btn-retry-wrong').style.display = 'none';
  } else {
    $('review-section').style.display = 'block';
    $('btn-retry-wrong').style.display = 'inline-block';

    wrong.forEach(a => {
      const div = document.createElement('div');
      div.className = 'review-item';
      div.innerHTML = `
        <div class="review-question">${a.question}</div>
        <div class="review-answers">
          <div class="review-wrong">✗ La tua risposta: ${a.selected}</div>
          <div class="review-correct">✓ Risposta corretta: ${a.correct}</div>
        </div>
      `;
      reviewList.appendChild(div);
    });
  }

  $('progress-fill').style.width = '100%';
  showScreen('results');
}

function retryWrong() {
  const wrongQuestions = answers
    .filter(a => !a.isCorrect)
    .map(a => DOMANDE.find(d => d.question === a.question))
    .filter(Boolean);

  if (wrongQuestions.length > 0) {
    numQuestions = wrongQuestions.length;
    startQuiz(wrongQuestions);
  }
}

// ========== BOOT ==========
init();
</script>
